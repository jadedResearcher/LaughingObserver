<html language="en">

<head>
  <meta charset="UTF-8">
  <meta name="description" content="Look. Laugh. Learn.">

  <title>Laughing Observer</title>
  <script src="utils.js"></script>
  <style>
    body {
      background-image: url(attic_jr2.jpg);
      background-size: contain;
      background-repeat: no-repeat;
      background-position-x: 0%;
      cursor: pointer;
    }

    #needful-things {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    #container {
      margin-left: auto;
      margin-top: auto;
      margin-bottom: auto;
      border-radius: 13px;
      font-size: 13px;
      padding-left: 31px;
      padding-right: 31px;
      padding-top: 13px;
      padding-bottom: 13px;
      text-align: left;
      width: 50%;
      background-color: rgba(255, 255, 255, 0.5);
      color: #a10000;
      font-family: 'Courier New', Courier, monospace;

    }
  </style>

  <script>

    let needfulThings;
    let audio = new Audio("https://laughing.observer/WeirdSounds/ambient_long_sounds/circusreversuslong.mp3");
    audio.loop = true;
    const iNeed = (text, href) => {
      const ele = createElementWithClassAndParent("a", needfulThings, "thing");
      ele.innerText = text;
      ele.href = href;
    }

    const playOnClick = () => {
      audio.play();
    }

    document.addEventListener('click', playOnClick, { once: true });

    window.onload = () => {
      audio.play().then(() => {
        removeEventListener(playOnClick);
      })


      injectMuteButton(() => {
        if (audio.paused) {
          audio.play();
        } else {
          audio.pause();
        }
      });

      window.onclick = () => {


      }
      needfulThings = document.querySelector("#needful-things")
      iNeed("To know what Zampanio is", "https://laughing.observer/zampanio_is.html")

      iNeed("To show off what I created", "https://laughing.observer/LTESim/webring");
      iNeed("To find Weird Sounds for what I create", "https://laughing.observer/AudioTutorial")
      iNeed("To find Weird Videos for what I create", "https://laughing.observer/VideoTutorial")
      iNeed("To find Weird Gifs for what I create", "https://laughing.observer/GifTutorial")

    }





  </script>


</head>

<body>

  <div id="container">
    <div id="jrsays">
      JR: hello there, Observer!!!
      <br>

      <br>
      JR: i can help :) :) :)
      <br>
      JR: just tell me what you need!!!
      <hr>
    </div>
    <div id="needful-things"></div>
  </div>
</body>

</html>
